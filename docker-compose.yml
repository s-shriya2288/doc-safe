version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: docsafe_db
    environment:
      POSTGRES_USER: docsafe
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: docsafe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
